/* ─────────────────────────────────────────────
   PATRONES DE COSTURA FLAMENCA
   App interactiva para generar patrones
   parametrizados con especialidad en moda flamenca

// ── Constantes ──
const CM_TO_PX = 3.7795275591; // 1cm = ~3.78px en pantalla (96dpi)
const PRINT_CM_TO_PX = 37.795275591; // para impresión a escala real (SVG)
const COLORS = {
  primary: "#B91C1C",
  primaryLight: "#FEE2E2",
  primaryDark: "#7F1D1D",

  accentLight: "#FEF3C7",

  surface: "#FFFFFF",

// ── Tipos de patrón ──
const PATTERN_TYPES = [{

// ── Medidas por defecto (cm) ──
const DEFAULT_MEASURES = {
  pecho: 90,
  cintura: 70,
  cadera: 96,
  largoCorpino: 42,
  largoFalda: 100,
  alturaCadera: 20,
  anchoEspalda: 38,
  largoManga: 58,
  contornoBrazo: 30,
  contornoMuneca: 16,
  alturaVolante: 25,
  numVolantes: 3,
  contornoVolante: 200,
  margenCosturaVolante: 1.5,
  numCoronas: 1,
  largoCola: 150,
  numGodets: 6
};

// ── Utilidades de geometría ──
function polarToCart(cx, cy, r, angleDeg) {
  const rad = angleDeg * Math.PI / 180;
  return {
    x: cx + r * Math.cos(rad),
    y: cy + r * Math.sin(rad)
  };
}
function arcPath(cx, cy, r, startAngle, endAngle, sweep = 1) {
  const s = polarToCart(cx, cy, r, startAngle);
  const e = polarToCart(cx, cy, r, endAngle);
  const large = endAngle - startAngle > 180 ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} ${sweep} ${e.x} ${e.y}`;
}
function bezierCurve(points) {
  if (points.length < 2) return "";
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const cpx = (prev.x + curr.x) / 2;
    d += ` Q ${prev.x} ${prev.y} ${cpx} ${(prev.y + curr.y) / 2}`;
  }
  const last = points[points.length - 1];
  d += ` L ${last.x} ${last.y}`;
  return d;
}

// ── Generadores de patrones ──

function generateCorpino(m, scale) {
  const s = scale;
  const pecho4 = m.pecho / 4 * s;
  const cintura4 = m.cintura / 4 * s;
  const largo = m.largoCorpino * s;
  const espalda2 = m.anchoEspalda / 2 * s;
  const cadera4 = m.cadera / 4 * s;
  const altCadera = m.alturaCadera * s;
  const pinzaPecho = (pecho4 - cintura4) * 0.4;
  const pinzaLateral = (pecho4 - cintura4) * 0.6;
  const paths = [];
  const marks = [];
  const labels = [];
  const ox = 30,
    oy = 30;

  // Delantero
  const dx = ox,
    dy = oy;
  const dPath = `M ${dx} ${dy}
        L ${dx + pecho4 + 2 * s} ${dy}
        L ${dx + pecho4 + 2 * s} ${dy + largo * 0.35}
        Q ${dx + pecho4 + 3 * s} ${dy + largo * 0.6} ${dx + cintura4 + pinzaLateral + 1 * s} ${dy + largo}
        L ${dx + cintura4 * 0.6 + pinzaPecho} ${dy + largo}
        L ${dx + cintura4 * 0.6} ${dy + largo}
        L ${dx} ${dy + largo}
        Z`;
  paths.push({
    d: dPath,
    label: "Delantero"
  });

  // Pinza delantera
  const pinzaX = dx + cintura4 * 0.6 + pinzaPecho / 2;
  marks.push({
    type: "pinza",
    x1: pinzaX - pinzaPecho / 2,
    y1: dy + largo,
    x2: pinzaX,
    y2: dy + largo * 0.55,
    x3: pinzaX + pinzaPecho / 2,
    y3: dy + largo
  });

  // Hilo de la tela delantero
  marks.push({
    type: "grano",
    x1: dx + 5 * s,
    y1: dy + 5 * s,
    x2: dx + 5 * s,
    y2: dy + largo - 5 * s
  });

  // Piquetes
  marks.push({
    type: "piquete",
    x: dx,
    y: dy + largo * 0.5
  });
  marks.push({
    type: "piquete",
    x: dx + pecho4 + 2 * s,
    y: dy + largo * 0.5
  });
  labels.push({
    text: "DELANTERO",
    x: dx + pecho4 / 2,
    y: dy + largo / 2,
    size: 14
  });
  labels.push({
    text: `${(m.pecho / 4 + 2).toFixed(1)} cm`,
    x: dx + pecho4 / 2,
    y: dy - 8,
    size: 10,
    color: COLORS.accent
  });
  labels.push({
    text: `${m.largoCorpino} cm`,
    x: dx - 18,
    y: dy + largo / 2,
    size: 10,
    color: COLORS.accent,
    rotate: -90
  });

  // Espalda (desplazado a la derecha)
  const ex = dx + pecho4 + 30 * s,
    ey = oy;
  const espalda4 = espalda2 / 2 + 1 * s;
  const ePath = `M ${ex} ${ey}
        L ${ex + espalda4 + 2 * s} ${ey}
        L ${ex + espalda4 + 2 * s} ${ey + largo * 0.35}
        Q ${ex + espalda4 + 2.5 * s} ${ey + largo * 0.6} ${ex + cintura4 * 0.95} ${ey + largo}
        L ${ex} ${ey + largo}
        Z`;
  paths.push({
    d: ePath,
    label: "Espalda"
  });
  marks.push({
    type: "grano",
    x1: ex + 5 * s,
    y1: ey + 5 * s,
    x2: ex + 5 * s,
    y2: ey + largo - 5 * s
  });
  marks.push({
    type: "piquete",
    x: ex,
    y: ey + largo * 0.5
  });
  labels.push({
    text: "ESPALDA",
    x: ex + espalda4 / 2,
    y: ey + largo / 2,
    size: 14
  });
  const totalW = ex + espalda4 + 35 * s;
  const totalH = oy + largo + 30;
  return {
    paths,
    marks,
    labels,
    width: totalW,
    height: totalH,
    name: "Corpiño Flamenca"
  };
}
function generateVolante(m, scale) {
  const s = scale;
  const anchoTela = 150; // ancho estándar de tela en cm
  // Fórmula correcta: R interior = contorno / (2 × π)
  const contorno = m.contornoVolante + m.margenCosturaVolante * 2;
  const rInnerCm = contorno / (2 * Math.PI);
  const rOuterCm = rInnerCm + m.alturaVolante;
  const diametroDona = rOuterCm * 2;

  // Cálculo automático de coronas:
  // Si la dona completa cabe en el ancho de tela → 1 corona de 360°
  // Si no cabe → calcular cuántas coronas parciales hacen falta
  let numCoronas, gradosPorCorona;
  if (diametroDona <= anchoTela) {
    numCoronas = 1;
    gradosPorCorona = 360;
  } else {
    // La corona parcial máxima que cabe en el ancho de tela
    // El ancho de tela limita el diámetro → usamos semicoronas o secciones
    const maxRadioQueCabe = anchoTela / 2;
    // Ángulo máximo que cabe: basado en la cuerda que cabe en el ancho de tela
    // Para una sección que quepa: el ancho de la sección ≈ 2 × rOuter × sin(ángulo/2)
    // Despejando: ángulo = 2 × arcsin(anchoTela / (2 × rOuterCm))
    const ratio = Math.min(1, anchoTela / (2 * rOuterCm));
    gradosPorCorona = Math.floor(2 * Math.asin(ratio) * 180 / Math.PI);
    gradosPorCorona = Math.max(gradosPorCorona, 30); // mínimo 30°
    numCoronas = Math.ceil(360 / gradosPorCorona);
    gradosPorCorona = 360 / numCoronas; // repartir uniformemente
  }

  const rInner = rInnerCm * s;
  const rOuter = rOuterCm * s;

  // Dibujar la dona (completa o una sección representativa)
  const cx = rOuter + 50, cy = rOuter + 50;
  const paths = [];
  const marks = [];
  const labels = [];

  if (numCoronas === 1) {
    // Dona completa (360°) — dos semicírculos para SVG
    const outerArc1 = arcPath(cx, cy, rOuter, 0, 179.99);
    const outerArc2 = arcPath(cx, cy, rOuter, 180, 359.99);
    const innerArc1 = arcPath(cx, cy, rInner, 359.99, 180, 0);
    const innerArc2 = arcPath(cx, cy, rInner, 179.99, 0, 0);
    const innerStart = polarToCart(cx, cy, rInner, 359.99);
    const outerStart = polarToCart(cx, cy, rOuter, 0);
    const outerMid = polarToCart(cx, cy, rOuter, 179.99);
    const d = `${outerArc1} L ${outerMid.x} ${outerMid.y} ${outerArc2} L ${innerStart.x} ${innerStart.y} ${innerArc1} ${innerArc2} L ${outerStart.x} ${outerStart.y} Z`;
    paths.push({ d, label: "Volante Circular" });
  } else {
    // Dibujar una sección representativa + indicar que hay más
    const startA = 90 - gradosPorCorona / 2;
    const endA = 90 + gradosPorCorona / 2;
    const outerArc = arcPath(cx, cy, rOuter, startA, endA);
    const innerArc = arcPath(cx, cy, rInner, endA, startA, 0);
    const eI = polarToCart(cx, cy, rInner, endA);
    const sO = polarToCart(cx, cy, rOuter, startA);
    const d = `${outerArc} L ${eI.x} ${eI.y} ${innerArc} L ${sO.x} ${sO.y} Z`;
    paths.push({ d, label: "Sección de corona" });

    // Dibujar líneas fantasma del resto de secciones
    for (let i = 1; i < numCoronas; i++) {
      const offset = i * gradosPorCorona;
      const sA = startA + offset;
      const eA = endA + offset;
      const ghostOuter = arcPath(cx, cy, rOuter, sA, eA);
      const ghostInner = arcPath(cx, cy, rInner, eA, sA, 0);
      const gEI = polarToCart(cx, cy, rInner, eA);
      const gSO = polarToCart(cx, cy, rOuter, sA);
      const gd = `${ghostOuter} L ${gEI.x} ${gEI.y} ${ghostInner} L ${gSO.x} ${gSO.y} Z`;
      paths.push({ d: gd, label: "", ghost: true });
    }
  }

  // Línea de corte para abrir la dona (radio)
  marks.push({
    type: "linea",
    x1: cx + rInner, y1: cy,
    x2: cx + rOuter, y2: cy,
    dashed: true
  });

  // Hilo de la tela
  const grainStart = polarToCart(cx, cy, rInner + 5 * s, 270);
  const grainEnd = polarToCart(cx, cy, rOuter - 5 * s, 270);
  marks.push({ type: "grano", x1: grainStart.x, y1: grainStart.y, x2: grainEnd.x, y2: grainEnd.y });

  // Piquetes de unión en el borde interior
  const piqueteInterval = numCoronas === 1 ? 90 : gradosPorCorona;
  for (let a = 0; a < 360; a += piqueteInterval) {
    const p = polarToCart(cx, cy, rInner, a);
    marks.push({ type: "piquete", x: p.x, y: p.y });
  }

  // Etiquetas con toda la info calculada
  labels.push({ text: "VOLANTE CIRCULAR", x: cx, y: cy - 18, size: 14 });
  labels.push({ text: `R interior: ${rInnerCm.toFixed(1)} cm`, x: cx, y: cy, size: 10, color: COLORS.accent });
  labels.push({ text: `R exterior: ${rOuterCm.toFixed(1)} cm`, x: cx, y: cy + 14, size: 10, color: COLORS.accent });
  labels.push({ text: `Altura: ${m.alturaVolante} cm`, x: cx, y: cy + 28, size: 10, color: COLORS.accent });
  labels.push({ text: `Contorno: ${contorno.toFixed(1)} cm (con margen)`, x: cx, y: cy + 44, size: 9, color: COLORS.textLight });

  if (numCoronas === 1) {
    labels.push({ text: `1 corona completa — cabe en tela de ${anchoTela} cm`, x: cx, y: cy + 58, size: 9, color: COLORS.grain });
    labels.push({ text: "Cortar aquí para abrir", x: cx + rOuter + 8, y: cy - 4, size: 8, color: COLORS.mark });
  } else {
    labels.push({ text: `${numCoronas} coronas de ${gradosPorCorona.toFixed(0)}° cada una`, x: cx, y: cy + 58, size: 10, color: COLORS.mark });
    labels.push({ text: `La dona no cabe entera (Ø ${diametroDona.toFixed(0)} cm > ${anchoTela} cm tela)`, x: cx, y: cy + 72, size: 9, color: COLORS.primary });
    labels.push({ text: `Cortar ${numCoronas} secciones y unir por los radios`, x: cx, y: cy + 86, size: 9, color: COLORS.mark });
  }

  // Metros de tela necesarios
  const altoCorona = numCoronas === 1 ? diametroDona : rOuterCm * 2;
  const metrosTela = ((altoCorona + 5) * (numCoronas === 1 ? 1 : numCoronas)) / 100;
  labels.push({ text: `Tela necesaria: ~${metrosTela.toFixed(2)} m (ancho ${anchoTela} cm)`, x: cx, y: cy + (numCoronas === 1 ? 72 : 102), size: 9, color: COLORS.textLight });

  const totalSize = (rOuter + 60) * 2;
  return {
    paths, marks, labels,
    width: totalSize, height: totalSize,
    name: "Volante Circular (Plato)"
  };
}
function generateFaldaVolantes(m, scale) {
  const s = scale;
  const cintura4 = m.cintura / 4 * s;
  const cadera4 = m.cadera / 4 * s;
  const largoTotal = m.largoFalda * s;
  const altCadera = m.alturaCadera * s;
  const numV = m.numVolantes;
  const altVolante = m.alturaVolante * s;
  const paths = [];
  const marks = [];
  const labels = [];
  const ox = 30,
    oy = 30;

  // Base de la falda (pieza recta desde cintura hasta cadera y luego ampliada)
  const faldaBase = largoTotal - numV * altVolante * 0.7;
  const anchoAbajo = cadera4 + 8 * s;
  const basePath = `M ${ox} ${oy}
        L ${ox + cintura4} ${oy}
        L ${ox + cadera4 + 2 * s} ${oy + altCadera}
        L ${ox + anchoAbajo} ${oy + faldaBase}
        L ${ox} ${oy + faldaBase}
        Z`;
  paths.push({
    d: basePath,
    label: "Base Falda"
  });
  marks.push({
    type: "grano",
    x1: ox + 5 * s,
    y1: oy + 5 * s,
    x2: ox + 5 * s,
    y2: oy + faldaBase - 5 * s
  });
  marks.push({
    type: "piquete",
    x: ox + cintura4 / 2,
    y: oy
  });
  labels.push({
    text: "BASE FALDA",
    x: ox + cadera4 / 2,
    y: oy + faldaBase / 2,
    size: 14
  });
  labels.push({
    text: `${m.largoFalda} cm total`,
    x: ox - 18,
    y: oy + faldaBase / 2,
    size: 10,
    color: COLORS.accent,
    rotate: -90
  });

  // Líneas de posición de volantes
  for (let i = 0; i < numV; i++) {
    const yPos = oy + faldaBase - i * altVolante * 0.5;
    if (yPos > oy + altCadera) {
      marks.push({
        type: "linea",
        x1: ox,
        y1: yPos,
        x2: ox + anchoAbajo,
        y2: yPos,
        dashed: true
      });
      labels.push({
        text: `Volante ${i + 1}`,
        x: ox + anchoAbajo + 5 * s,
        y: yPos,
        size: 9,
        color: COLORS.mark
      });
    }
  }

  // Volante individual (miniatura dona a la derecha)
  // Fórmula: R interior = contorno de la falda en esa línea / (2π)
  const contornoFalda = m.cadera * Math.PI; // aprox contorno completo a nivel de cadera
  const vr1cm = contornoFalda / (2 * Math.PI);
  const vr2cm = vr1cm + m.alturaVolante;
  const miniScale = Math.min(s, (faldaBase * 0.4) / vr2cm); // escalar para que quepa
  const vr1 = vr1cm * miniScale;
  const vr2 = vr2cm * miniScale;
  const vox = ox + anchoAbajo + 25 * s;
  const voy = oy + 10 * s;
  const vcx = vox + vr2, vcy = voy + vr2;

  // Dona completa (dos semicírculos)
  const vOuter1 = arcPath(vcx, vcy, vr2, 0, 179.99);
  const vOuter2 = arcPath(vcx, vcy, vr2, 180, 359.99);
  const vInner1 = arcPath(vcx, vcy, vr1, 359.99, 180, 0);
  const vInner2 = arcPath(vcx, vcy, vr1, 179.99, 0, 0);
  const vConnOuter = polarToCart(vcx, vcy, vr2, 359.99);
  const vConnInner = polarToCart(vcx, vcy, vr1, 359.99);
  const vStartOuter = polarToCart(vcx, vcy, vr2, 0);
  const vStartInner = polarToCart(vcx, vcy, vr1, 0);

  const vPath = `${vOuter1} L ${polarToCart(vcx, vcy, vr2, 179.99).x} ${polarToCart(vcx, vcy, vr2, 179.99).y} ${vOuter2} L ${vConnInner.x} ${vConnInner.y} ${vInner1} ${vInner2} L ${vStartOuter.x} ${vStartOuter.y} Z`;
  paths.push({ d: vPath, label: "Volante" });

  // Línea de corte
  marks.push({ type: "linea", x1: vcx + vr1, y1: vcy, x2: vcx + vr2, y2: vcy, dashed: true });

  labels.push({
    text: `VOLANTE ×${numV}`,
    x: vcx, y: vcy - 6, size: 12
  });
  labels.push({
    text: `R int: ${vr1cm.toFixed(1)} cm`,
    x: vcx, y: vcy + 10, size: 9, color: COLORS.accent
  });
  labels.push({
    text: `Alt: ${m.alturaVolante} cm`,
    x: vcx, y: vcy + 22, size: 9, color: COLORS.accent
  });
  const totalW = vox + vr2 * 2 + 40;
  const totalH = oy + faldaBase + 40;
  return {
    paths,
    marks,
    labels,
    width: totalW,
    height: totalH,
    name: "Falda de Volantes"
  };
}
function generateManga(m, scale) {
  const s = scale;
  const largo = m.largoManga * s;
  const brazo2 = m.contornoBrazo / 2 * s;
  const muneca2 = m.contornoMuneca / 2 * s;
  const copaCurve = brazo2 * 0.55;
  const paths = [];
  const marks = [];
  const labels = [];
  const ox = 40,
    oy = 50;
  const cx = ox + brazo2;

  // Copa de manga
  const mangaPath = `M ${ox} ${oy + copaCurve}
        Q ${ox} ${oy} ${cx} ${oy}
        Q ${ox + brazo2 * 2} ${oy} ${ox + brazo2 * 2} ${oy + copaCurve}
        L ${cx + muneca2} ${oy + largo}
        L ${cx - muneca2} ${oy + largo}
        Z`;
  paths.push({
    d: mangaPath,
    label: "Manga"
  });
  marks.push({
    type: "grano",
    x1: cx,
    y1: oy + 10 * s,
    x2: cx,
    y2: oy + largo - 5 * s
  });
  marks.push({
    type: "piquete",
    x: cx,
    y: oy
  });
  marks.push({
    type: "piquete",
    x: ox,
    y: oy + copaCurve
  });
  marks.push({
    type: "piquete",
    x: ox + brazo2 * 2,
    y: oy + copaCurve
  });
  labels.push({
    text: "MANGA",
    x: cx,
    y: oy + largo / 2,
    size: 14
  });
  labels.push({
    text: `${m.largoManga} cm`,
    x: cx + brazo2 + 12,
    y: oy + largo / 2,
    size: 10,
    color: COLORS.accent,
    rotate: -90
  });
  const totalW = ox + brazo2 * 2 + 50;
  const totalH = oy + largo + 40;
  return {
    paths,
    marks,
    labels,
    width: totalW,
    height: totalH,
    name: "Manga"
  };
}
function generateGodets(m, scale) {
  const s = scale;
  const cintura4 = m.cintura / 4 * s;
  const cadera4 = m.cadera / 4 * s;
  const largo = m.largoFalda * s;
  const altCadera = m.alturaCadera * s;
  const numG = m.numGodets;
  const paths = [];
  const marks = [];
  const labels = [];
  const ox = 30,
    oy = 30;

  // Panel base de la falda
  const panelW = cadera4;
  const basePath = `M ${ox} ${oy}
        L ${ox + cintura4} ${oy}
        L ${ox + cadera4} ${oy + altCadera}
        L ${ox + cadera4} ${oy + largo}
        L ${ox} ${oy + largo}
        Z`;
  paths.push({
    d: basePath,
    label: "Panel Falda"
  });

  // Líneas de inserción de godets
  const godetSpacing = cadera4 / (numG + 1);
  for (let i = 1; i <= numG; i++) {
    const gx = ox + godetSpacing * i;
    marks.push({
      type: "linea",
      x1: gx,
      y1: oy + altCadera + 5 * s,
      x2: gx,
      y2: oy + largo,
      dashed: true
    });
  }
  marks.push({
    type: "grano",
    x1: ox + 5 * s,
    y1: oy + 5 * s,
    x2: ox + 5 * s,
    y2: oy + largo - 5 * s
  });
  labels.push({
    text: "PANEL FALDA",
    x: ox + cadera4 / 2,
    y: oy + largo / 2 - 10,
    size: 14
  });

  // Pieza de godet
  const gox = ox + cadera4 + 25 * s;
  const godetH = largo - altCadera;
  const godetW = 20 * s;
  const godetPath = `M ${gox + godetW} ${oy + altCadera}
        L ${gox + godetW * 2} ${oy + largo}
        Q ${gox + godetW} ${oy + largo + 5 * s} ${gox} ${oy + largo}
        Z`;
  paths.push({
    d: godetPath,
    label: "Godet"
  });
  marks.push({
    type: "grano",
    x1: gox + godetW,
    y1: oy + altCadera + 10 * s,
    x2: gox + godetW,
    y2: oy + largo - 5 * s
  });
  labels.push({
    text: `GODET ×${numG}`,
    x: gox + godetW,
    y: oy + largo / 2 + altCadera / 2,
    size: 12
  });
  const totalW = gox + godetW * 2 + 40;
  const totalH = oy + largo + 20 * s;
  return {
    paths,
    marks,
    labels,
    width: totalW,
    height: totalH,
    name: "Falda Godets"
  };
}
function generateBataCola(m, scale) {
  const s = scale;
  const cintura4 = m.cintura / 4 * s;
  const cadera4 = m.cadera / 4 * s;
  const largoFrente = m.largoFalda * s;
  const largoCola = m.largoCola * s;
  const altCadera = m.alturaCadera * s;
  const paths = [];
  const marks = [];
  const labels = [];
  const ox = 30,
    oy = 30;

  // Panel principal con cola progresiva
  const colaPath = `M ${ox} ${oy}
        L ${ox + cintura4 + 5 * s} ${oy}
        L ${ox + cadera4 + 8 * s} ${oy + altCadera}
        L ${ox + cadera4 + 15 * s} ${oy + largoFrente}
        Q ${ox + cadera4 + 20 * s} ${oy + largoCola * 0.7} ${ox + cadera4 * 0.7} ${oy + largoCola}
        Q ${ox + cadera4 * 0.3} ${oy + largoCola + 5 * s} ${ox} ${oy + largoCola * 0.85}
        L ${ox} ${oy + largoFrente}
        Z`;
  paths.push({
    d: colaPath,
    label: "Bata de Cola"
  });
  marks.push({
    type: "grano",
    x1: ox + 8 * s,
    y1: oy + 5 * s,
    x2: ox + 8 * s,
    y2: oy + largoFrente - 5 * s
  });
  marks.push({
    type: "piquete",
    x: ox,
    y: oy + largoFrente
  });
  marks.push({
    type: "piquete",
    x: ox + cadera4 + 15 * s,
    y: oy + largoFrente
  });

  // Líneas de volantes en la cola
  const numVolCola = 5;
  for (let i = 1; i <= numVolCola; i++) {
    const yy = oy + largoFrente + (largoCola - largoFrente) * i / (numVolCola + 1) * 0.6;
    marks.push({
      type: "linea",
      x1: ox,
      y1: yy,
      x2: ox + cadera4 + 10 * s,
      y2: yy - 5 * s,
      dashed: true
    });
  }
  labels.push({
    text: "BATA DE COLA",
    x: ox + cadera4 / 2 + 5 * s,
    y: oy + largoFrente / 2,
    size: 14
  });
  labels.push({
    text: `Frente: ${m.largoFalda} cm`,
    x: ox - 18,
    y: oy + largoFrente / 2,
    size: 10,
    color: COLORS.accent,
    rotate: -90
  });
  labels.push({
    text: `Cola: ${m.largoCola} cm`,
    x: ox + cadera4 + 20 * s,
    y: oy + largoCola / 2,
    size: 10,
    color: COLORS.accent,
    rotate: -90
  });
  const totalW = ox + cadera4 + 30 * s;
  const totalH = oy + largoCola + 15 * s;
  return {
    paths,
    marks,
    labels,
    width: totalW,
    height: totalH,
    name: "Bata de Cola"
  };
}
